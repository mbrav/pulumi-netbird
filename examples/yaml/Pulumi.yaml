name: provider-netbird
runtime: yaml

# plugins.providers with path is for local development only (uses ../../bin binary).
# When using the published plugin, remove this block and install via:
#   pulumi plugin install resource netbird <version> --server github://api.github.com/mbrav/pulumi-netbird
plugins:
  providers:
    - name: netbird
      path: ../../bin

config:
  netbird:token:
    type: string
    secret: true
  netbird:url:
    type: string
    default: https://api.netbird.io

variables:
  # ── Invoke Functions (Data Sources) ────────────────────────────────────────
  # Look up the built-in "All" group that NetBird creates automatically.
  # Every peer joins this group on registration; it cannot be created via Pulumi.
  allGroup:
    fn::invoke:
      function: netbird:function:lookupGroup
      arguments:
        name: All

  # List every peer currently registered in the account.
  allPeers:
    fn::invoke:
      function: netbird:function:getPeers
      arguments: {}

  # List only peers that belong to the DevOps group (resolved from the resource above).
  devopsPeers:
    fn::invoke:
      function: netbird:function:getPeers
      arguments:
        groupId: ${group-devops.id}

outputs:
  networkR1:
    value:
      name: ${net-r1.name}
      id: ${net-r1.id}
  dnsZoneCorp:
    value:
      name: ${dns-zone-corp.name}
      domain: ${dns-zone-corp.domain}
      id: ${dns-zone-corp.id}
  # Outputs from invoke functions
  allGroupId:
    value: ${allGroup.groupId}
  allGroupPeersCount:
    value: ${allGroup.peersCount}
  allPeerCount:
    value: ${allPeers.peers}
  devopsPeerCount:
    value: ${devopsPeers.peers}

resources:
  # ── Groups ──────────────────────────────────────────────────────────────────
  # Peer groups used to scope policies, network resources, and DNS zones.

  group-devops:
    type: netbird:resource:Group
    properties:
      name: DevOps
      peers: []

  group-dev:
    type: netbird:resource:Group
    properties:
      name: Dev
      peers: []

  group-backoffice:
    type: netbird:resource:Group
    properties:
      name: Backoffice
      peers: []

  group-hr:
    type: netbird:resource:Group
    properties:
      name: HR
      peers: []

  # ── Networks ─────────────────────────────────────────────────────────────────
  # Overlay network for Region 1 that groups related subnets and routers.

  net-r1:
    type: netbird:resource:Network
    properties:
      name: R1
      description: Network for Region 1

  # ── Network Resources ────────────────────────────────────────────────────────
  # Subnet resources attached to net-r1; accessible by the DevOps group.

  netres-r1-net-01:
    type: netbird:resource:NetworkResource
    properties:
      name: Region 1 Net 01
      description: Network 01 in Region 1
      networkID: ${net-r1.id}
      address: 10.10.1.0/24
      enabled: true
      groupIDs:
        - ${group-devops.id}

  netres-r1-net-02:
    type: netbird:resource:NetworkResource
    properties:
      name: Region 1 Net 02
      description: Network 02 in Region 1
      networkID: ${net-r1.id}
      address: 10.10.2.0/24
      enabled: true
      groupIDs:
        - ${group-devops.id}

  netres-r1-net-03:
    type: netbird:resource:NetworkResource
    properties:
      name: Region 1 Net 03
      description: Network 03 in Region 1
      networkID: ${net-r1.id}
      address: 10.10.3.0/24
      enabled: true
      groupIDs:
        - ${group-devops.id}

  # ── Network Router ────────────────────────────────────────────────────────────
  # Masquerading router for net-r1; uses DevOps group as peer group.

  router-r1:
    type: netbird:resource:NetworkRouter
    properties:
      networkID: ${net-r1.id}
      enabled: true
      masquerade: true
      metric: 10
      peerGroups:
        - ${group-devops.id}

  # ── Posture Check ─────────────────────────────────────────────────────────────
  # Validates peer properties before granting policy access.
  # Combines: client version, OS version, geo location, network range, and process.

  posture-devops:
    type: netbird:resource:PostureCheck
    properties:
      name: DevOps Posture
      description: "Enforce client version, OS, geo, network range, and process checks"
      checks:
        # Require minimum NetBird client version 0.28.0.
        nbVersionCheck:
          minVersion: "0.28.0"
        # Require minimum OS versions per platform.
        osVersionCheck:
          darwin:
            minVersion: "13.0"
          linux:
            minKernelVersion: "5.15"
          windows:
            minKernelVersion: "10.0"
        # Allow peers only from Germany (DE) or United States (US).
        geoLocationCheck:
          action: allow
          locations:
            - countryCode: DE
            - countryCode: US
              cityName: New York
        # Deny peers whose local network is a private RFC-1918 /8 range.
        peerNetworkRangeCheck:
          action: deny
          ranges:
            - 10.0.0.0/8
        # Require the NetBird agent binary to be present on each platform.
        processCheck:
          processes:
            - linuxPath: /usr/bin/netbird
              macPath: /usr/local/bin/netbird
              windowsPath: 'C:\Program Files\NetBird\netbird.exe'

  # ── Policies ──────────────────────────────────────────────────────────────────
  # Policy: DevOps/Dev → Region 1 Net 02 (subnet destination, with posture check).

  policy-ssh-grp-src-net-dest:
    type: netbird:resource:Policy
    properties:
      name: "SSH Policy - Group to Subnet"
      description: "Allow SSH (22/TCP) from DevOps and Dev groups to Region 1 Net 02"
      enabled: true
      postureChecks:
        - ${posture-devops.id}
      rules:
        - name: "SSH Access - Group → Subnet"
          description: "Allow unidirectional SSH from DevOps & Dev groups to Net 02"
          bidirectional: false
          action: accept
          enabled: true
          protocol: tcp
          ports:
            - "22"
          sources:
            - ${group-devops.id}
            - ${group-dev.id}
          destinationResource:
            type: subnet
            id: ${netres-r1-net-02.id}

  # Policy: DevOps → Backoffice (group-to-group destination, no posture).

  policy-ssh-grp-src-grp-dest:
    type: netbird:resource:Policy
    properties:
      name: "SSH Policy - Group to Group"
      description: "Allow SSH (22/TCP) from DevOps to Backoffice group resources"
      enabled: true
      postureChecks: []
      rules:
        - name: "SSH Access - Group → Group"
          description: "SSH from DevOps group to Backoffice group"
          bidirectional: false
          action: accept
          enabled: true
          protocol: tcp
          ports:
            - "22"
          sources:
            - ${group-devops.id}
          destinations:
            - ${group-backoffice.id}

  # ── DNS Settings ───────────────────────────────────────────────────────────────
  # Singleton resource — only one exists per account.
  # disabledManagementGroups: groups whose peers resolve DNS outside NetBird.

  dns-settings:
    type: netbird:resource:DNSSettings
    properties:
      disabledManagementGroups: []

  # ── DNS Zone ───────────────────────────────────────────────────────────────────
  # Internal DNS zone for corp.example.com distributed to DevOps and Dev groups.
  # enableSearchDomain: allows bare hostnames to be resolved within the zone.

  dns-zone-corp:
    type: netbird:resource:DNSZone
    properties:
      name: corp-internal
      domain: corp.example.com
      enabled: true
      enableSearchDomain: true
      distributionGroups:
        - ${group-devops.id}
        - ${group-dev.id}

  # ── DNS Records ────────────────────────────────────────────────────────────────
  # A record pointing the gateway hostname to an internal IPv4 address.

  dns-record-gw-a:
    type: netbird:resource:DNSRecord
    properties:
      zoneID: ${dns-zone-corp.id}
      name: gw.corp.example.com
      type: A
      content: 10.10.1.1
      ttl: 300

  # CNAME record aliasing api.corp.example.com to the gateway hostname.
  dns-record-api-cname:
    type: netbird:resource:DNSRecord
    properties:
      zoneID: ${dns-zone-corp.id}
      name: api.corp.example.com
      type: CNAME
      content: gw.corp.example.com
      ttl: 300

  # ── Reverse Proxy Domain ───────────────────────────────────────────────────────
  # Custom domain validated against a specific proxy cluster.
  # Domain changes trigger resource replacement (no Update endpoint exists).

  rp-domain-corp:
    type: netbird:resource:ReverseProxyDomain
    properties:
      domain: proxy.corp.example.com
      targetCluster: eu-central-1

  # ── Setup Key ─────────────────────────────────────────────────────────────────
  # Reusable setup key for onboarding new peers into the DevOps group.
  # usageLimit 0 = unlimited uses; expiresIn 0 = no expiry.

  setup-key-devops:
    type: netbird:resource:SetupKey
    properties:
      name: DevOps Onboarding
      type: reusable
      expiresIn: 0
      usageLimit: 0
      ephemeral: false
      allowExtraDnsLabels: false
      autoGroups:
        - ${group-devops.id}

  # ── Route ─────────────────────────────────────────────────────────────────────
  # Network route advertising 192.168.10.0/24 through the DevOps peer group.
  # masquerade: true hides the source IP behind the router's address.

  route-r1-mgmt:
    type: netbird:resource:Route
    properties:
      networkId: route-r1-mgmt
      description: Management subnet route via Region 1
      enabled: true
      network: 192.168.10.0/24
      masquerade: true
      metric: 100
      keepRoute: true
      groups:
        - ${group-devops.id}
      peerGroups:
        - ${group-devops.id}

  # ── Service User ──────────────────────────────────────────────────────────────
  # Automation service user with admin role; placed in the DevOps group.

  user-ci-bot:
    type: netbird:resource:User
    properties:
      role: admin
      isServiceUser: true
      name: ci-bot
      autoGroups:
        - ${group-devops.id}

  # ── Reverse Proxy Service ──────────────────────────────────────────────────────
  # HTTP (L7) reverse proxy routing traffic to an internal backend host.
  # passHostHeader: preserves the original Host header forwarded to the backend.
  # rewriteRedirects: rewrites Location headers in backend responses.

  rp-svc-api:
    type: netbird:resource:ReverseProxyService
    properties:
      name: api-service
      domain: ${rp-domain-corp.domain}
      enabled: true
      mode: http
      passHostHeader: true
      rewriteRedirects: false
      targets:
        - enabled: true
          host: 10.10.1.10
          port: 8080
          protocol: http
          targetType: host
          targetId: ""
