resources:
  # Peers are imported, never created via the API.
  # All fields use ignoreChanges because the peer client controls its own settings.
  # Reference peers elsewhere by ${peer-<name>.id}.

  peer-server-us:
    type: netbird:resource:Peer
    properties:
      name: server-us
    options:
      protect: true
      ignoreChanges:
        - name
        - loginExpirationEnabled
        - inactivityExpirationEnabled
        - sshEnabled

  peer-server-eu:
