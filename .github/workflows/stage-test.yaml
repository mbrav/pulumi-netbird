name: Test

on:
  workflow_call:

env:
  GOPATH: /home/runner/go

jobs:
  provider-tests:
    name: Provider Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: /home/runner/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum', 'tests/go.mod', 'tests/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Go build
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('go.mod', 'go.sum', 'tests/go.mod', 'tests/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Download Go modules
        run: |
          go mod download
          cd tests && go mod download

      - name: Run provider tests
        run: make test_provider
