name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "go.mod"
      - "go.sum"
      - "provider/**"
      - "tests/**"
      - "examples/**"
      - ".github/workflows/**"
    tags:
      - "*"

jobs:
  lint:
    name: Lint Code
    uses: ./.github/workflows/stage-lint.yaml

  test:
    name: Provider Tests
    uses: ./.github/workflows/stage-test.yaml

  build:
    name: Build and Release
    needs:
      - lint
      - test
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '.')
    uses: ./.github/workflows/stage-build.yaml
