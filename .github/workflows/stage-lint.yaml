name: Lint

on:
  workflow_call:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Override GOPATH so the module cache lands at /home/runner/go/pkg/mod
  # the same host path the build job uses — enabling shared cache hits.
  GOPATH: /home/runner/go

jobs:
  lint:
    container: golangci/golangci-lint:v2.12.2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo ✅
        uses: actions/checkout@v6

      - name: Cache Go modules 📦
        uses: actions/cache@v5
        with:
          path: /home/runner/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache golangci-lint analysis 🧹
        uses: actions/cache@v5
        with:
          path: /root/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-

      - name: Lint 🧹
        run: make lint
