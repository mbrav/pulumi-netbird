name: Build

on:
  workflow_call:

jobs:
  build:
    name: Build Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go ✨
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Cache Go modules 📦
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Go build 🔨
        uses: actions/cache@v5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Install Pulumi CLI 🚀
        uses: pulumi/actions@v7
        with:
          pulumi-version: ^3
      #
      # - name: Install pulumictl
      #   run: |
      #     go install github.com/pulumi/pulumictl/cmd/pulumictl@latest
      #   shell: bash
      #

      - name: Install pulumictl 💿
        shell: bash
        run: |
          set -e

          VERSION="v0.0.50"
          OS="$(uname | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"

          case "$ARCH" in
            x86_64) ARCH="amd64" ;;
            arm64|aarch64) ARCH="arm64" ;;
            *) echo "❌ Unsupported architecture: $ARCH" && exit 1 ;;
          esac

          FILENAME="pulumictl-${VERSION}-${OS}-${ARCH}.tar.gz"
          DOWNLOAD_URL="https://github.com/pulumi/pulumictl/releases/download/${VERSION}/${FILENAME}"

          echo "⬇️ Downloading ${DOWNLOAD_URL}"
          curl -sSL "${DOWNLOAD_URL}" -o "/tmp/${FILENAME}"

          mkdir -p /tmp/pulumictl-bin
          tar -xzf "/tmp/${FILENAME}" -C /tmp/pulumictl-bin
          sudo mv /tmp/pulumictl-bin/pulumictl /usr/local/bin/

          RESULT_VERSION=$(pulumictl version)
          echo "✅ Succesfully installed pulumictl v${RESULT_VERSION}"

      - name: Cross build binaries 📦
        run: make cross_build

      - name: Extract release notes from CHANGELOG 📋
        id: changelog
        shell: bash
        run: |
          # Strip leading 'v' from tag (v0.3.0 -> 0.3.0)
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the block for this version: from "## [VERSION]" up to (but not
          # including) the next "## [" heading, then strip the leading blank line.
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{if(flag) exit} flag" \
            CHANGELOG.md | sed '/./,$!d' > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "⚠️  No CHANGELOG entry found for version ${VERSION}, using empty notes."
            echo "Release ${GITHUB_REF_NAME}" > /tmp/release-notes.md
          fi

          echo "✅ Release notes for ${VERSION}:"
          cat /tmp/release-notes.md

      - name: Publish release with assets 📢
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          name: "${{ github.ref_name }}"
          body_path: /tmp/release-notes.md
          files: |
            dist/*.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
