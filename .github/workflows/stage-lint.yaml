name: Lint

on:
  workflow_call:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    container: golangci/golangci-lint:v2.12.2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo ✅
        uses: actions/checkout@v6

      - name: Cache Go modules and lint cache 📦
        uses: actions/cache@v5
        with:
          path: |
            /root/go/pkg/mod
            /root/.cache/go-build
            /root/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golangci-

      - name: Lint 🧹
        run: make lint
